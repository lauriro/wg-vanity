name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    strategy:
      matrix:
        include:
          - target: linux-amd64
            cross: x86_64-linux-gnu-
            march: x86-64
            packages: gcc-x86-64-linux-gnu
          - target: linux-arm64
            cross: aarch64-linux-gnu-
            march: armv8-a
            packages: gcc-aarch64-linux-gnu
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get update && sudo apt-get install -y ${{ matrix.packages }}
      - run: make CROSS_COMPILE=${{ matrix.cross }} CFLAGS="-O3 -march=${{ matrix.march }}" VERSION=${{ github.ref_name }}
      - run: mv wg-vanity wg-vanity-${{ matrix.target }}
      - uses: softprops/action-gh-release@v2
        with:
          files: wg-vanity-${{ matrix.target }}

